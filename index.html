<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <title>Brain Trainer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <h1>Brain Trainer</h1>
            <div class="stats">
                <span id="streak">🔥 <span id="streak-count">0</span></span>
                <span id="score"><span id="correct-count">0</span>/<span id="total-count">0</span></span>
            </div>
        </header>

        <!-- Category Pills -->
        <div class="category-pills">
            <button class="pill active" data-category="all">All</button>
            <button class="pill" data-category="probability">Probability</button>
            <button class="pill" data-category="tvm">TVM</button>
            <button class="pill" data-category="gametheory">Game Theory</button>
            <button class="pill" data-category="stats">Stats</button>
            <button class="pill" data-category="combinatorics">Counting</button>
        </div>

        <!-- Question Card -->
        <main class="question-card">
            <div class="category-badge" id="category-badge">Probability</div>
            <div class="question-text" id="question-text">
                Loading...
            </div>

            <!-- Answer Input -->
            <div class="answer-section" id="answer-section">
                <input type="text" id="answer-input" class="answer-input" placeholder="Your answer..." inputmode="decimal" autocomplete="off">
                <button id="submit-btn" class="submit-btn">Check</button>
            </div>

            <!-- Multiple Choice (when applicable) -->
            <div class="choices-section hidden" id="choices-section">
                <button class="choice-btn" data-choice="0"></button>
                <button class="choice-btn" data-choice="1"></button>
                <button class="choice-btn" data-choice="2"></button>
                <button class="choice-btn" data-choice="3"></button>
            </div>

            <!-- Result Feedback -->
            <div class="result-section hidden" id="result-section">
                <div class="result-icon" id="result-icon">✓</div>
                <div class="result-text" id="result-text">Correct!</div>
                <div class="explanation" id="explanation"></div>
                <button id="next-btn" class="next-btn">Next Question →</button>
            </div>
        </main>

        <!-- Skip button -->
        <button id="skip-btn" class="skip-btn">Skip this one</button>
    </div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
